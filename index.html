<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Command Prompt</title>
    <style>
        body {
            background-color: #0c0c0c; /* Цвет консоли Win11 */
            color: #cccccc; /* Светло-серый текст */
            font-family: 'Consolas', 'Lucida Console', monospace;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            line-height: 1.2;
        }
        #terminal {
            display: flex;
            flex-direction: column;
        }
        #output {
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
        }
        .prompt {
            white-space: nowrap;
            margin-right: 5px;
        }
        #command-input {
            background: transparent;
            border: none;
            color: #cccccc;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">Microsoft Windows [Version 10.0.26200.8246]
(c) Microsoft Corporation. All rights reserved.
<br></div>
        <div class="input-line">
            <span class="prompt">C:\Users\whysoloud3></span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = input.value.trim();
                processCommand(command);
                input.value = '';
            }
        });

        function processCommand(cmd) {
            // Вывод самой команды, как в реальной CMD
            output.innerHTML += `<div>C:\\Users\\whysoloud3>${cmd}</div>`;
            
            let response = "";
            const lowerCmd = cmd.toLowerCase();

            if (lowerCmd === 'help') {
                response = "For more information on a specific command, type HELP command-name.<br>HELP, CLS, EXIT, ECHO, WHOAMI";
            } else if (lowerCmd === 'cls') {
                output.innerHTML = "Microsoft Windows [Version 10.0.26200.8246]<br>(c) Microsoft Corporation. All rights reserved.<br><br>";
                return;
            } else if (lowerCmd === 'whoami') {
                response = "whysoloud3\\wolf";
            } else if (lowerCmd.startsWith('echo ')) {
                response = cmd.substring(5);
            } else if (lowerCmd === '') {
                // Если просто нажали Enter
            } else {
                response = `'${cmd}' is not recognized as an internal or external command,<br>operable program or batch file.`;
            }

            if (response) {
                output.innerHTML += `<div>${response}</div><br>`;
            } else {
                output.innerHTML += `<br>`;
            }
            
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Автофокус при клике
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
