<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>whysoloud3 cmd</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #cccccc;
            font-family: 'Consolas', 'Lucida Console', monospace;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            line-height: 1.2;
            overflow-x: hidden;
        }
        #terminal {
            display: flex;
            flex-direction: column;
        }
        #output {
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
            gap: 0; 
        }
        .prompt {
            white-space: nowrap;
        }
        #command-input {
            background: transparent;
            border: none;
            color: #cccccc;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            padding: 0;
            margin: 0;
            text-indent: 0; 
        }
        .wolf-img {
            max-width: 400px;
            margin: 10px 0;
            border: 1px solid #333;
            display: block;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">Microsoft Windows [Version 10.0.26200.8246]
(c) Microsoft Corporation. All rights reserved.

Type 'help' to help.
<br></div>
        <div class="input-line">
            <span class="prompt">C:\Users\whysoloud3></span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const wolfImage = "https://images.pexels.com/photos/682375/pexels-photo-682375.jpeg?auto=compress&cs=tinysrgb&w=300";

        const helpData = {
            "help": "Provides Help information for Windows commands.",
            "cls": "Clears the screen.",
            "echo": "Displays messages, or turns command-echoing on or off.",
            "whoami": "Displays user, group and privileges information for the user who is currently logged on to the local system.",
            "wolf": "Executes wolf.exe to display a visual representation of a wolf."
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = input.value.trim();
                processCommand(command);
                input.value = '';
            }
        });

        function processCommand(cmd) {
            output.innerHTML += `<div>C:\\Users\\whysoloud3>${cmd}</div>`;
            let response = "";
            const parts = cmd.toLowerCase().split(' ');
            const mainCmd = parts[0];
            const arg = parts[1];

            if (mainCmd === 'help') {
                if (arg && helpData[arg]) {
                    response = helpData[arg];
                } else if (arg) {
                    response = `This command is not supported by the help utility. Try "help".`;
                } else {
                    response = "For more information on a specific command, type HELP command-name.<br>HELP, CLS, ECHO, WHOAMI, WOLF";
                }
            } else if (mainCmd === 'cls') {
                output.innerHTML = "Microsoft Windows [Version 10.0.26200.8246]<br>(c) Microsoft Corporation. All rights reserved.<br><br>";
                return;
            } else if (mainCmd === 'whoami') {
                response = "whysoloud3\\wolf";
            } else if (mainCmd === 'echo') {
                response = cmd.substring(5) || "ECHO is on.";
            } else if (mainCmd === 'wolf') {
                output.innerHTML += `<div><img src="${wolfImage}" class="wolf-img"></div>`;
                response = "Wolf process completed.";
            } else if (mainCmd === '') {
            } else {
                response = `'${mainCmd}' is not recognized as an internal or external command,<br>operable program or batch file.`;
            }

            if (response) {
                output.innerHTML += `<div>${response}</div><br>`;
            } else {
                output.innerHTML += `<br>`;
            }
            window.scrollTo(0, document.body.scrollHeight);
        }
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
