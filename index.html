<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whysoloud3 cmd</title>
    <style>
        :root {
            --main-text: #cccccc;
            --bg-color: #0c0c0c;
            --window-bg: rgba(12, 12, 12, 0.95);
            --title-bg: #1e1e1e;
            --prompt-color: #cccccc;
            --link-label-color: #9dadd1; 
            --link-url-color: #cccccc;   
        }

        /* Центрируем окно на странице */
        body {
            background-color: #1a1a1a; /* Темный фон за пределами окна */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Оболочка окна Windows 11 */
        .window-frame {
            width: 850px;
            height: 500px;
            background-color: var(--window-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        /* Шапка окна (Title Bar) */
        .title-bar {
            background-color: var(--title-bg);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .title-text {
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
        }
        
        .control-btn:hover { opacity: 1; }

        /* Область самого терминала */
        #terminal {
            padding: 10px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'Consolas', 'Lucida Console', monospace;
            font-size: 14px;
            line-height: 1.3;
            color: var(--main-text);
        }

        /* Стилизация скроллбара под Win11 */
        #terminal::-webkit-scrollbar { width: 8px; }
        #terminal::-webkit-scrollbar-track { background: transparent; }
        #terminal::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        #terminal::-webkit-scrollbar-thumb:hover { background: #444; }

        #output { white-space: pre-wrap; }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            white-space: nowrap;
            color: var(--prompt-color);
        }

        #command-input {
            background: transparent;
            border: none;
            color: var(--main-text);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            padding: 0;
            margin-left: 5px;
        }

        .wolf-img {
            max-width: 400px;
            margin: 10px 0;
            border: 1px solid #333;
            display: block;
        }

        .link-item { margin: 4px 0; }
        .link-label { color: var(--link-label-color); margin-right: 10px; }
        a { color: var(--link-url-color); text-decoration: underline; }
        a:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="window-frame">
        <div class="title-bar">
            <div class="title-text">
                <span style="opacity: 0.6">⚙️</span> C:\WINDOWS\system32\cmd.exe
            </div>
            <div class="window-controls">
                <span class="control-btn">─</span>
                <span class="control-btn">▢</span>
                <span class="control-btn" style="color: #ff5f56">✕</span>
            </div>
        </div>

        <div id="terminal">
            <div id="output">Microsoft Windows [Version 10.0.26200.8246]
(c) Microsoft Corporation. All rights reserved.
<br>Type "links" for bio.
Type "help" for more information.<br><br></div>
            <div class="input-line">
                <span class="prompt">C:\Users\whysoloud3></span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        const wolfImage = "https://images.pexels.com/photos/682375/pexels-photo-682375.jpeg?auto=compress&cs=tinysrgb&w=300";

        const welcomeMessage = "Microsoft Windows [Version 10.0.26200.8246]<br>(c) Microsoft Corporation. All rights reserved.<br><br>Type \"links\" for bio.<br>Type \"help\" for more information.<br><br>";

        const helpData = {
            "help": "Provides Help information for Windows commands.",
            "cls": "Clears the screen.",
            "echo": "Displays messages, or turns command-echoing on or off.",
            "whoami": "Displays user information.",
            "wolf": "Executes wolf.exe to display a visual representation of a wolf.",
            "links": "Displays social links and personal information.",
            "bio": "Displays social links and personal information."
        };

        const socialLinks = `
            <div class="link-item"><span class="link-label">[+] Roblox:</span><a href="https://www.roblox.com/users/593342978/profile" target="_blank">www.roblox.com/users/593342978/profile</a></div>
            <div class="link-item"><span class="link-label">[+] Discord:</span><a href="https://discordapp.com/users/1195033848854106252" target="_blank">discordapp.com/users/1195033848854106252</a></div>
            <div class="link-item"><span class="link-label">[+] Steam:</span><a href="https://steamcommunity.com/id/whysoloud3/" target="_blank">steamcommunity.com/id/whysoloud3/</a></div>
            <div class="link-item"><span class="link-label">[+] Spotify:</span><a href="#" target="_blank">spotify.com/user/whysoloud3</a></div>
            <div class="link-item"><span class="link-label">[+] FakeCrime:</span><a href="https://fakecrime.bio/xso6er" target="_blank">fakecrime.bio/xso6er</a></div>
        `;

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = input.value.trim();
                processCommand(command);
                input.value = '';
            }
        });

        function processCommand(cmd) {
            output.innerHTML += `<div>C:\\Users\\whysoloud3>${cmd}</div>`;
            let response = "";
            const parts = cmd.toLowerCase().split(' ');
            const mainCmd = parts[0];
            const arg = parts[1];

            if (mainCmd === 'help') {
                if (arg && helpData[arg]) {
                    response = helpData[arg];
                } else if (arg) {
                    response = `This command is not supported by the help utility. Try "help".`;
                } else {
                    response = "For more information on a specific command, type HELP command-name.<br>CLS, ECHO, HELP, LINKS, WHOAMI, WOLF";
                }
            } else if (mainCmd === 'cls') {
                output.innerHTML = welcomeMessage;
                return;
            } else if (mainCmd === 'whoami') {
                response = "whysoloud3\\wolf";
            } else if (mainCmd === 'bio' || mainCmd === 'links') {
                output.innerHTML += `<div>${socialLinks}</div>`;
            } else if (mainCmd === 'echo') {
                response = cmd.substring(5) || "ECHO is on.";
            } else if (mainCmd === 'wolf') {
                output.innerHTML += `<div><img src="${wolfImage}" class="wolf-img"></div>`;
                response = "Wolf process completed.";
            } else if (mainCmd === '') {
                // Пустая команда
            } else {
                response = `'${mainCmd}' is not recognized as an internal or external command,<br>operable program or batch file.`;
            }

            if (response) {
                output.innerHTML += `<div>${response}</div><br>`;
            } else {
                output.innerHTML += `<br>`;
            }
            
            // Автопрокрутка вниз внутри терминала
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Фокус на ввод при клике в любое место окна
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
