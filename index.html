<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>whysoloud3 cmd</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #cccccc;
            font-family: 'Consolas', 'Lucida Console', monospace;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            line-height: 1.2;
            overflow-x: hidden;
        }
        #terminal {
            display: flex;
            flex-direction: column;
        }
        #output {
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
            gap: 0; 
        }
        .prompt {
            white-space: nowrap;
            margin-right: 0px; 
        }
        #command-input {
            background: transparent;
            border: none;
            color: #cccccc;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            padding: 0;
            margin: 0;
            text-indent: 0; 
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">Microsoft Windows [Version 10.0.26200.8246]
(c) Microsoft Corporation. All rights reserved.
<br></div>
        <div class="input-line">
            <span class="prompt">C:\Users\whysoloud3></span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const wolfImages = [
            "https://i.imgur.com/8x8J8hF.jpeg",
            "https://i.imgur.com/gO4R9vA.jpeg",
            "https://i.imgur.com/6G2gH2s.jpeg",
            "https://i.imgur.com/mO2X1r3.jpeg",
            "https://i.imgur.com/b9L5fU1.jpeg"
        ];

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = input.value.trim();
                processCommand(command);
                input.value = '';
            }
        });

        function processCommand(cmd) {
            output.innerHTML += `<div>C:\\Users\\whysoloud3>${cmd}</div>`;
            let response = "";
            const lowerCmd = cmd.toLowerCase();

            if (lowerCmd === 'help') {
                response = "For more information on a specific command, type HELP command-name.<br>HELP, CLS, ECHO, WHOAMI, WOLF";
            } else if (lowerCmd === 'cls') {
                output.innerHTML = "Microsoft Windows [Version 10.0.26200.8246]<br>(c) Microsoft Corporation. All rights reserved.<br><br>";
                return;
            } else if (lowerCmd === 'whoami') {
                response = "whysoloud3\\wolf";
            } else if (lowerCmd.startsWith('echo ')) {
                response = cmd.substring(5);
            } else if (lowerCmd === 'wolf') {
                const randomWolf = wolfImages[Math.floor(Math.random() * wolfImages.length)];
                window.open(randomWolf, '_blank');
                response = "Initializing wolf.exe... Image opened in a new tab.";
            } else if (lowerCmd === '') {
            } else {
                response = `'${cmd}' is not recognized as an internal or external command,<br>operable program or batch file.`;
            }

            if (response) {
                output.innerHTML += `<div>${response}</div><br>`;
            } else {
                output.innerHTML += `<br>`;
            }
            window.scrollTo(0, document.body.scrollHeight);
        }
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
